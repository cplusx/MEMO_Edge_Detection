expt_dir: experiments
num_quantize_level: 1
num_out_channels: 2
image_size: 256
test_image_size: ${image_size}
expt_name: binary_lora_bsds_default_all_data
trainer_args:
  max_epochs: 200
  accelerator: "gpu"
  devices: [0,1]
  limit_train_batches: 6400
  limit_val_batches: 1
  check_val_every_n_epoch: 1
  log_every_n_steps: 5
  precision: 32
  strategy: "deepspeed_stage_2"
edge_trainer:
  target: pl_trainer.discrete_edge_trainer.MEMOEdgeLoRATrainer
  params:
    accumulate_grad_batches: 8
    loss_weights: 
      focal_xentropy: 1.0
    optim_args: 
      lr: 2e-5
    use_8bit_adam: False
    gradient_checkpointing: True
    use_ema: True
    ema_decay: 0.99
    ema_start: 1000
    cond_drop_rate: 0.1
    guidance_scale: 2.0
    init_weights: experiments/MEMO_1_dinov2/epoch=0279.ckpt/checkpoint/mp_rank_00_model_states.pt
pipe:
  target: pipelines.MEMO_pipeline.MEMOEdgeLocalMaximumPipeline
  params: {}
denoiser: 
  target: models.UNet_with_dinov2.UNet2DwithDINOv2
  params:
    in_channels: 32
    out_channels: ${num_out_channels}
    down_block_types:
      - DownBlock2D
      - DownBlock2D
      - DownBlock2D
      - DownBlock2D
    up_block_types:
      - UpBlock2D
      - UpBlock2D
      - UpBlock2D
      - UpBlock2D
    block_out_channels:
      - 128
      - 256
      - 512
      - 768
    layers_per_block: 2
data:
  batch_size: 2
  val_batch_size: 4
  train_shuffle: true
  val_shuffle: true
  collate_fn: 
    target: edge_datasets.dataset_utils.bsds_full_resolution_image_edge_collate_fn
  train:
    target: edge_datasets.dataset_utils.JointDataset
    params:
      mode: "train"
      sampling_rates:
        - 1.
        - 5.
      subdatasets:
        - target: edge_datasets.edge_datasets.granular_BSDS.EndlessGranularBSDSDatasetWithEdgeLabelsNoAugmentation
          params: 
            image_dir: edge_data/BSDS500
            granular_edge_dir: edge_data/repurposed_BSDS_edges
            image_shape: 
              - ${image_size}
              - ${image_size}
            mode: train_val
            max_granularity: ${num_quantize_level}
  val:
    target: edge_datasets.dataset_utils.ConcatDataset
    params:
      mode: "val"
      subdatasets:
        - target: edge_datasets.edge_datasets.granular_BSDS.EndlessGranularBSDSDatasetWithEdgeLabelsNoAugmentation
          params: 
            image_dir: edge_data/BSDS500
            granular_edge_dir: edge_data/repurposed_BSDS_edges
            image_shape: 
              - ${image_size}
              - ${image_size}
            max_granularity: ${num_quantize_level}
            mode: test
            max_samples: 100
callbacks:
  - target: pytorch_lightning.callbacks.ModelCheckpoint
    params:
      dirpath: "${expt_dir}/${expt_name}"
      filename: "{epoch:04d}"
      monitor: epoch
      mode: max
      save_top_k: 5
      save_last: true
      every_n_epochs: 10
  - target: callbacks.edge_training_logger.MEMOTrainingLogger
    params:
      max_num_images: 8
    require_wandb: true
